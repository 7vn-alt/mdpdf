<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Library</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 20px;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .pdf-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        iframe {
            width: 100%;
            height: 450px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .buttons {
            margin-top: 10px;
        }

        a {
            text-decoration: none;
            color: white;
            background: #007BFF;
            padding: 10px 18px;
            border-radius: 5px;
            margin: 5px;
            display: inline-block;
        }

        a:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<h1>PDF Library</h1>

<div class="container">

    <div class="pdf-card">
        <h3>PDF 1</h3>
        <iframe src="pdf1.pdf"></iframe>
        <div class="buttons">
            <a href="pdf1.pdf" target="_blank">Read Full</a>
            <a href="pdf1.pdf" download>Download</a>
        </div>
    </div>

    <div class="pdf-card">
        <h3>PDF 2</h3>
        <iframe src="pdf2.pdf"></iframe>
        <div class="buttons">
            <a href="pdf2.pdf" target="_blank">Read Full</a>
            <a href="pdf2.pdf" download>Download</a>
        </div>
    </div>

    <div class="pdf-card">
        <h3>PDF 3</h3>
        <iframe src="pdf3.pdf"></iframe>
        <div class="buttons">
            <a href="pdf3.pdf" target="_blank">Read Full</a>
            <a href="pdf3.pdf" download>Download</a>
        </div>
    </div>

    <div class="pdf-card">
        <h3>PDF 4</h3>
        <iframe src="pdf4.pdf"></iframe>
        <div class="buttons">
            <a href="pdf4.pdf" target="_blank">Read Full</a>
            <a href="pdf4.pdf" download>Download</a>
        </div>
    </div>

</div>

</body>
</html>
